<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Conduit logo">
  <defs>
    <linearGradient id="conduitFlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- The "port": one rounded hub that everything flows through -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#conduitFlow)"/>
  <!-- Conduit channels: three links converging on one central node -->
  <g stroke="#F8FAFC" stroke-width="3.2" stroke-linecap="round" opacity="0.95">
    <line x1="32" y1="32" x2="32" y2="14"/>
    <line x1="32" y1="32" x2="16" y2="46"/>
    <line x1="32" y1="32" x2="48" y2="46"/>
  </g>
  <!-- Endpoints -->
  <g fill="#F8FAFC">
    <circle cx="32" cy="12" r="4.4"/>
    <circle cx="15" cy="47" r="4.4"/>
    <circle cx="49" cy="47" r="4.4"/>
  </g>
  <!-- Central hub node -->
  <circle cx="32" cy="32" r="6.6" fill="#0D1117"/>
  <circle cx="32" cy="32" r="3.1" fill="#F8FAFC"/>
</svg>
